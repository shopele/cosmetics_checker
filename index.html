<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>化粧品・医薬部外品 表記チェッカー</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<header class="app-header">
  <h1>化粧品・医薬部外品 表記チェッカー</h1>
  <p>薬機法に基づく必須記載事項をAIで確認します（業務用）</p>
</header>

<main class="container">

  <!-- 設定エリア -->
  <section class="card">
    <h2 class="card-title">チェックカテゴリ</h2>
    <div class="radio-group">
      <label class="radio-option">
        <input type="radio" name="category" value="cosmetic" checked>
        <span>
          化粧品
          <span class="law-note">薬機法第61条</span>
        </span>
      </label>
      <label class="radio-option">
        <input type="radio" name="category" value="quasi_drug">
        <span>
          医薬部外品
          <span class="law-note">薬機法第59条</span>
        </span>
      </label>
    </div>
  </section>

  <!-- 画像アップロード -->
  <section class="card">
    <h2 class="card-title">製品画像のアップロード</h2>
    <div class="drop-zone" id="dropZone">
      <svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/>
        <polyline points="21 15 16 10 5 21"/>
      </svg>
      <p>画像をドラッグ＆ドロップ、またはクリックして選択</p>
      <span>複数枚選択可（外箱・本体・各面など）</span>
      <input type="file" id="fileInput" multiple accept="image/*" style="display:none">
    </div>
    <div class="preview-actions">
      <span id="imageCount" class="hint"></span>
      <button class="btn btn-ghost" id="clearImagesBtn" style="display:none">✕ 画像をクリア</button>
    </div>
    <div class="preview-list" id="previewList"></div>
  </section>

  <!-- チェック実行 -->
  <section class="card">
    <div id="errorMsg" class="error-msg"></div>
    <button class="btn btn-primary" id="checkBtn" disabled>チェック実行</button>
    <div class="spinner" id="spinner">AIが確認中です... しばらくお待ちください</div>
  </section>

  <!-- 結果表示 -->
  <section class="card" id="resultArea" style="display:none"></section>

  <!-- 履歴 -->
  <section class="card">
    <div class="history-header">
      <h2 class="card-title" style="margin-bottom:0">チェック履歴</h2>
      <button class="btn btn-secondary" id="exportBtn" disabled>
        📥 CSVエクスポート
      </button>
    </div>
    <div class="table-wrapper">
      <table class="history-table">
        <thead>
          <tr>
            <th>チェック日時</th>
            <th>カテゴリ</th>
            <th>画像枚数</th>
            <th>全体判定</th>
            <th>詳細</th>
          </tr>
        </thead>
        <tbody id="historyBody">
          <tr><td colspan="5" class="empty-row">履歴はありません</td></tr>
        </tbody>
      </table>
    </div>
  </section>

</main>

<footer class="app-footer">
  <strong>【免責事項】</strong>
  本ツールによる判定はAIによる参考情報です。最終的な薬機法への適合判断は、必ず薬事専門家または行政機関にご確認ください。当ツールの判定結果を根拠とした法的責任は負いかねます。
</footer>

<script src="js/rules.js"></script>
<script src="js/app.js"></script>
</body>
</html>
